name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  APP_NAME: NovaLauncher
  CASK_NAME: nova-launcher
  TAP_REPOSITORY: suho/homebrew-tap

jobs:
  release:
    name: Build release and update tap
    runs-on: macos-26

    steps:
      - name: Resolve release tag
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_TAG}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must look like v0.1.0; got ${tag}"
            exit 1
          fi

          version="${tag#v}"
          zip_name="${APP_NAME}-${version}.zip"

          {
            echo "tag=${tag}"
            echo "version=${version}"
            echo "zip_name=${zip_name}"
          } >>"${GITHUB_OUTPUT}"

      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1

      - name: Install fastlane
        id: fastlane
        run: |
          set -euo pipefail

          if [[ -f Gemfile ]]; then
            bundle install --jobs 4 --retry 3
            echo "command=bundle exec fastlane" >>"${GITHUB_OUTPUT}"
          else
            gem install fastlane --no-document
            echo "command=fastlane" >>"${GITHUB_OUTPUT}"
          fi

      - name: Create signing keychain
        id: signing
        run: |
          set -euo pipefail

          keychain_password="$(uuidgen)"
          keychain_name="nova-release-${GITHUB_RUN_ID}.keychain-db"

          security create-keychain -p "${keychain_password}" "${keychain_name}"
          security set-keychain-settings -lut 21600 "${keychain_name}"
          security unlock-keychain -p "${keychain_password}" "${keychain_name}"
          security list-keychains -d user -s "${keychain_name}"
          security default-keychain -d user -s "${keychain_name}"

          {
            echo "keychain=${keychain_name}"
            echo "password=${keychain_password}"
          } >>"${GITHUB_OUTPUT}"

      - name: Install Developer ID certificate with fastlane match
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
          MATCH_KEYCHAIN_NAME: ${{ steps.signing.outputs.keychain }}
          MATCH_KEYCHAIN_PASSWORD: ${{ steps.signing.outputs.password }}
          FASTLANE_SKIP_UPDATE_CHECK: "1"
          FASTLANE_HIDE_CHANGELOG: "1"
        run: |
          set -euo pipefail

          if [[ -z "${MATCH_GIT_URL:-}" || -z "${MATCH_PASSWORD:-}" ]]; then
            echo "::error::Set MATCH_GIT_URL and MATCH_PASSWORD secrets for fastlane match."
            exit 1
          fi

          if [[ -n "${MATCH_GIT_PRIVATE_KEY:-}" && ! -f "${MATCH_GIT_PRIVATE_KEY}" ]]; then
            private_key_path="${RUNNER_TEMP}/match_git_private_key"
            printf '%s\n' "${MATCH_GIT_PRIVATE_KEY}" >"${private_key_path}"
            chmod 600 "${private_key_path}"
            export MATCH_GIT_PRIVATE_KEY="${private_key_path}"
          fi

          fastlane_command="${{ steps.fastlane.outputs.command }}"
          ${fastlane_command} match developer_id \
            --readonly \
            --skip_provisioning_profiles \
            --keychain_name "${MATCH_KEYCHAIN_NAME}" \
            --keychain_password "${MATCH_KEYCHAIN_PASSWORD}"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${MATCH_KEYCHAIN_PASSWORD}" \
            "${MATCH_KEYCHAIN_NAME}"

      - name: Resolve Developer ID signing identity
        id: developer-id
        env:
          SIGNING_KEYCHAIN: ${{ steps.signing.outputs.keychain }}
        run: |
          set -euo pipefail

          signing_identity="$(
            security find-identity -v -p codesigning "${SIGNING_KEYCHAIN}" |
              awk -F '"' '/Developer ID Application/ { print $2; exit }'
          )"

          if [[ -z "${signing_identity}" ]]; then
            echo "::error::No Developer ID Application identity found after running fastlane match."
            security find-identity -v -p codesigning "${SIGNING_KEYCHAIN}" || true
            exit 1
          fi

          echo "identity=${signing_identity}" >>"${GITHUB_OUTPUT}"

      - name: Run tests
        run: swift test

      - name: Build app bundle
        run: ./script/build_and_run.sh --bundle

      - name: Sign app bundle
        env:
          SIGNING_IDENTITY: ${{ steps.developer-id.outputs.identity }}
          SIGNING_KEYCHAIN: ${{ steps.signing.outputs.keychain }}
        run: |
          set -euo pipefail

          codesign \
            --force \
            --timestamp \
            --options runtime \
            --keychain "${SIGNING_KEYCHAIN}" \
            --sign "${SIGNING_IDENTITY}" \
            "dist/${APP_NAME}.app"

      - name: Verify Developer ID signature
        run: |
          set -euo pipefail
          codesign --verify --strict --verbose=2 "dist/${APP_NAME}.app"
          codesign --display --verbose=4 "dist/${APP_NAME}.app"

      - name: Notarize and staple app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_ID:-}" || -z "${APPLE_TEAM_ID:-}" || -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
            echo "::error::Set APPLE_ID, APPLE_TEAM_ID, and APPLE_APP_SPECIFIC_PASSWORD secrets for notarization."
            exit 1
          fi

          notarization_zip="${RUNNER_TEMP}/${APP_NAME}-${VERSION}-notarization.zip"
          ditto -c -k --keepParent "dist/${APP_NAME}.app" "${notarization_zip}"

          xcrun notarytool submit "${notarization_zip}" \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --wait

          xcrun stapler staple "dist/${APP_NAME}.app"
          xcrun stapler validate "dist/${APP_NAME}.app"
          spctl -a -vvv --type execute "dist/${APP_NAME}.app"

      - name: Package release asset
        id: package
        run: |
          set -euo pipefail

          zip_name="${{ steps.release.outputs.zip_name }}"

          cd dist
          ditto -c -k --keepParent "${APP_NAME}.app" "../${zip_name}"
          cd ..

          shasum -a 256 "${zip_name}" | tee SHA256SUMS
          checksum="$(cut -d ' ' -f 1 SHA256SUMS)"

          {
            echo "checksum=${checksum}"
            echo "asset_url=https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.release.outputs.tag }}/${zip_name}"
          } >>"${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          ZIP_NAME: ${{ steps.release.outputs.zip_name }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${ZIP_NAME}" SHA256SUMS --clobber
          else
            gh release create "${TAG}" "${ZIP_NAME}" SHA256SUMS \
              --title "Nova Launcher ${VERSION}" \
              --notes "Release ${VERSION}"
          fi

      - name: Dispatch Homebrew tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          SHA256: ${{ steps.package.outputs.checksum }}
          ASSET_URL: ${{ steps.package.outputs.asset_url }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::Set the HOMEBREW_TAP_TOKEN repository secret with write access to ${TAP_REPOSITORY}."
            exit 1
          fi

          gh api "repos/${TAP_REPOSITORY}/dispatches" \
            --method POST \
            --field event_type="nova-launcher-release" \
            --field client_payload[tag]="${TAG}" \
            --field client_payload[version]="${VERSION}" \
            --field client_payload[sha256]="${SHA256}" \
            --field client_payload[asset_url]="${ASSET_URL}" \
            --field client_payload[source_repository]="${GITHUB_REPOSITORY}" \
            --field client_payload[source_sha]="${GITHUB_SHA}"

      - name: Delete signing keychain
        if: always() && steps.signing.outputs.keychain != ''
        run: security delete-keychain "${{ steps.signing.outputs.keychain }}" || true
